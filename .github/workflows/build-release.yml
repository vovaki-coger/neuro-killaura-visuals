name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v2.0.1)'
        required: false
        default: 'v2.0.0'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Verify imports
        run: |
          python -c "import customtkinter; print('customtkinter OK')"
          python -c "import torch; print('torch OK:', torch.__version__)"
          python -c "import pygame; print('pygame OK')"
          python -c "import numpy; print('numpy OK')"
          python -c "import PIL; print('PIL OK')"

      - name: Generate synthetic model weights
        run: python generate_weights.py

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller neuro_killaura.spec --noconfirm --clean --log-level WARN

      - name: Verify build output
        run: |
          dir dist\NeuroKillAura\
          echo "Build successful!"

      - name: Archive release
        shell: pwsh
        run: |
          Compress-Archive -Path dist\NeuroKillAura\ -DestinationPath dist\NeuroKillAura-Windows-x64.zip -Force
          echo "Archive size: $((Get-Item dist\NeuroKillAura-Windows-x64.zip).Length / 1MB) MB"

      - name: Determine release tag
        id: tag
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "TAG=${{ github.event.inputs.version || 'v2.0.0' }}" >> $GITHUB_OUTPUT
          fi

      - name: Delete existing release (if any)
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete ${{ steps.tag.outputs.TAG }} --yes 2>/dev/null || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.TAG }}
          name: "⚡ Neuro KillAura ${{ steps.tag.outputs.TAG }}"
          body: |
            ## ⚡ Neuro KillAura Launcher ${{ steps.tag.outputs.TAG }}

            ### 📥 Установка
            1. Скачай `NeuroKillAura-Windows-x64.zip` ниже
            2. Распакуй в любую папку
            3. Запусти `NeuroKillAura.exe`
            4. Войди в аккаунт → нажми **Запустить**

            > Требуется Windows 10/11 x64. GPU не нужен (CPU достаточно).

            ### ⌨️ Горячие клавиши
            | Клавиша | Действие |
            |---------|---------|
            | `INSERT` | Открыть/закрыть меню |
            | `R` | Вкл/выкл KillAura |
            | `G` | Вкл/выкл визуалы |
            | `H` | Вкл/выкл HUD |
            | `ESC` | Выход |

            ### 🧩 Компоненты
            - **Лаунчер** — CustomTkinter, темы dark/light/purple
            - **Нейросеть** — PyTorch MLP 16→64→32→4, human-like aim
            - **Авторизация** — Microsoft OAuth, Mojang, Оффлайн
            - **Pulse Visuals** — пульсирующие круги, частицы, hit waves
            - **Rili ESP** — Box ESP, Tracers, Health/Armor bars, Radar, Crosshair
            - **HUD** — CPS-график, combo, watermark, keybinds
          files: dist/NeuroKillAura-Windows-x64.zip
          draft: false
          prerelease: false
          make_latest: true
